root = "."
tmp_dir = "tmp"

[build]
  # Build the frontend first, then the Go binary
  pre_cmd = ["mkdir -p dist && test -f dist/index.html || (cd frontend && npm run build)"]
  cmd = "go build -o ./tmp/main ."
  bin = "./tmp/main"
  delay = 1000
  exclude_dir = ["tmp", "dist", "frontend", "node_modules", "data"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "html", "env"]
  kill_delay = "1s"
  send_interrupt = true
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
